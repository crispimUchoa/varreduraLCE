name: Run daily job

on:
  schedule:
    - cron: "0 21 * * *"  # 18h Fortaleza (UTC-3)
  workflow_dispatch:      # botão pra rodar manual

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar script
        run: python main.py